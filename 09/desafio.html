<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Layout 1</title>

<style>

*{
    margin: 0;
    padding: 0;
}

#principal{
    width: 1000px;
    margin: 20px auto;
}

#header{
    background: #6c7ae0;
    height: 100px;
    text-align: center;
    line-height: 100px;
}

#esquerda{
    background: #f4e28b;
    width: 25%;
    height: 400px;
    float: left;
}

#centro{
    background: #8ff08f;
    width: 50%;
    height: 400px;
    float: left;
}

#direita{
    background: #f7b26a;
    width: 25%;
    height: 400px;
    float: left;
}

#footer{
    background: #d08ce0;
    height: 60px;
    text-align: center;
    line-height: 60px;
    clear: both;
}

</style>

</head>
<body>

<div id="principal">

    <div id="header">
        Header
    </div>

    <div id="esquerda">
        Left
    </div>

    <div id="centro">
        Center
    </div>

    <div id="direita">
        Right
    </div>

    <div id="footer">
        Footer
    </div>

</div>

</body>
</html>
