<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Layout 2</title>

<style>

*{
    margin: 0;
    padding: 0;
}

#principal{
    width: 1000px;
    margin: 20px auto;
}

#menu{
    background: #b9414f;
    color: white;
    height: 50px;
    text-align: center;
    line-height: 50px;
}

#header{
    background: #4a5bc9;
    color: white;
    height: 120px;
    text-align: center;
    line-height: 120px;
}

#content{
    background: #72d15f;
    width: 75%;
    height: 400px;
    float: left;
    text-align: center;
    line-height: 400px;
}

#sidebar{
    background: #5e8f4b;
    width: 25%;
    height: 400px;
    float: left;
    text-align: center;
    line-height: 400px;
}

#footer{
    background: #c78b3d;
    height: 70px;
    clear: both;
    text-align: center;
    line-height: 70px;
}

</style>

</head>
<body>

<div id="principal">

    <div id="menu">
        MAIN MENU
    </div>

    <div id="header">
        HEADER
    </div>

    <div id="content">
        CONTENT
    </div>

    <div id="sidebar">
        SIDE BAR
    </div>

    <div id="footer">
        FOOTER
    </div>

</div>

</body>
</html>
