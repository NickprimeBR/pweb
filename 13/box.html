<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Sizing</title>

    <style>

        .box{
            width: 250px;
            height: 120px;
            padding: 20px;
            border: 15px solid blue;

            /* Prefixos de compatibilidade */
            -webkit-box-sizing: border-box;
            -moz-box-sizing: border-box;
            box-sizing: border-box;

            background: lightblue;
            margin: 30px;
            text-align: center;
            line-height: 70px;
            font-size: 20px;
        }

    </style>

</head>
<body>

    <div class="box">
        Box Sizing
    </div>

</body>
</html>
