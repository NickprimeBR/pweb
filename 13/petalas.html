<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">
    <title>Atividade Pétalas</title>

    <style>

        .petala{
            width:100px;
            height:100px;
            float:left;
        }

        .vermelha{
            background:red;
            border-radius:50px 50px 0 50px;
        }

        .amarela{
            background:orange;
            border-radius:50px 50px 50px 0;
        }

        .verde{
            background:green;
            border-radius:50px 0 50px 50px;
            clear:left;
        }

        .roxa{
            background:purple;
            border-radius:0 50px 50px 50px;
        }

        .circulo{
            width:200px;
            height:200px;
            border-radius:100px;
            overflow:hidden;
            float:left;
            margin-left:50px;
        }

        .quadrante{
            width:100px;
            height:100px;
            float:left;
        }

        .q1{
            background:red;
        }

        .q2{
            background:orange;
        }

        .q3{
            background:green;
        }

        .q4{
            background:purple;
        }

    </style>

</head>

<body>
    
    <h1> quadrado de pétalas </h1>

    <div class="petala vermelha"></div>
    <div class="petala amarela"></div>

    <div class="petala verde"></div>
    <div class="petala roxa"></div>


    

    <div class="circulo">

        <div class="quadrante q1"></div>
        <div class="quadrante q2"></div>
        <div class="quadrante q3"></div>
        <div class="quadrante q4"></div>

    </div>

</body>
</html>
