<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> atividade 15 </title>

    <style>

        body{
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box{
            position: relative;
            width: 100px;
            height: 100px;
            background: red;

            animation: minhaAnimacao 10s infinite;
        }
                
        .box:hover{
            border: solid 5px black;
            transition: border 3s 2s;
        }

         @keyframes minhaAnimacao{

            0%{
                background: red;
                transform: rotate(0deg);
            }

            25%{
                background: blue;
                transform: rotate(90deg);
            }

            50%{
                background: green;
                transform: rotate(180deg);
            }

            75%{
                background: yellow;
                transform: rotate(270deg);
            }

            100%{
                background: purple;
                transform: rotate(360deg);
            }

        }
    
    </style>
    
</head>
<body>
        <div class="box"></div>
</body>
</html>
