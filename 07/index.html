<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Fontes e cores</title>

    <style type="text/css">

        .fonteserif{
            font-family: "Times New roman", Times, Georgia, serif;
            font-size: 5em;
            font-style: bold;
        }

        .fonteSans-Serif{
            font-family: verdana, Arial, Helvetica, sans-serif;;
            font-size: 2.5em;
            font-style: italic;
        }

        .fonteMonospace{
            font-family: "Courier New", Courier, Consolas, monospace;
            font-size: 1.25em;
            font-style:normal;
        }

        .conteudo{
            font-family: 30px;
        }

    </style>
</head>
<body>
   
    <div class="conteudo">

        <p class="fonteserif"> Programação Web</p>
        <p class="fonteSans-Serif"> Programação Web</p>
        <p class="fonteMonospace"> Programação Web</p>

    </div> 

</body>
</html>
