<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Desafio atividade 06 </title>

    <style type="css/text">

      body{
            background-color: #e6e6e6;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 10px;
        }

        .header{
            background-color: #57b657;
            color: white;
            text-align: center;
            padding: 20px;
            margin-bottom: 10px;
        }

        .container{
            display: flex;
            gap: 20px;
        }

        .sidebar{
            background-color: #dcdcdc;
            width: 150px;
            padding: 10px;
        }

        .main-content{
            background-color: #dcdcdc;
            flex: 1;
            padding: 20px;
        }

        .footer{
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 250px;
        }

    </style>

</head>
<body>

  <div class="header">
    <h1> Minha Página web</h1>
  </div>

  <div class="main-content">
    <p> Este é o conteúdo principal da página </p>
    <p> Aqui você pode visualizar as principais informações</p>
  </div>

  <div class="sidebar">
    <ul>
        <li> Item 1 </li>
        <li> item 2 </li>
        <li> Item 3 </li>
    </ul>
  </div>

  <div class="footer">

    <p> <span class="copy"> copyright &copy; </span> Todos os direitos reservados </p> 

  </div>
    
</body>
</html>
